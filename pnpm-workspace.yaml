packages:
  - "apps/*"
  - "packages/*"
  - "examples/*"

# pnpm 11 applies a 24h minimumReleaseAge supply-chain check on frozen installs.
# Exclude lockfile-pinned versions until they mature; add entries when bumping deps.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - hono@4.12.23
  - undici@7.26.0

# pnpm 11 strictDepBuilds: allow postinstall scripts required by the stack.
allowBuilds:
  esbuild: true
  sharp: true
  protobufjs: true
  "@clerk/shared": true

catalog:
  zod: ^4.4.3
  typescript: ^6.0.3
  tsx: ^4.22.3
  turbo: ^2.9.14
  hono: ^4.12.23
  "@hono/node-server": ^2.0.4
  "@modelcontextprotocol/sdk": ^1.29.0
  inngest: ^4.4.0
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  postgres: ^3.4.9
  next: ^16.2.6
  react: ^19.2.6
  react-dom: ^19.2.6
  "@types/node": ^25.9.1
  "@types/react": ^19.2.15
  "@types/react-dom": ^19.2.3
  ai: ^6.0.191
  "@ai-sdk/anthropic": ^3.0.79
  e2b: ^2.24.0
