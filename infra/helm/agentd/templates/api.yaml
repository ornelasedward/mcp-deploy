apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentd.fullname" . }}-api
  labels:
    {{- include "agentd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8787
      targetPort: 8787
  selector:
    app: {{ include "agentd.fullname" . }}-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentd.fullname" . }}-api
  labels:
    {{- include "agentd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "agentd.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "agentd.fullname" . }}-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: PLATFORM_BASE_URL
              value: {{ include "agentd.apiUrl" . | quote }}
            - name: WEB_BASE_URL
              value: {{ include "agentd.webUrl" . | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.secrets.existingSecret | default (printf "%s-secrets" (include "agentd.fullname" .)) }}
                  key: DATABASE_URL
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.saml.enabled }}
            - name: SAML_ENABLED
              value: "true"
            - name: SAML_SP_ENTITY_ID
              value: {{ .Values.saml.entityId | quote }}
            - name: SAML_SP_ACS_URL
              value: {{ .Values.saml.acsUrl | quote }}
            {{- end }}
            {{- if .Values.e2b.enabled }}
            - name: RUNTIME
              value: e2b
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.secrets.existingSecret | default (printf "%s-secrets" (include "agentd.fullname" .)) }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
